name: checks

on:
  pull_request:
  push:
    branches: [main]

# 同一 PR の続けざまの push は前の run をキャンセルする
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # rust-toolchain.toml の channel (nightly-2026-04-03) を honor。
          # rustfmt は rust-toolchain.toml に含めていないのでここで明示確保。
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # workspace.members が空 (`[]`) のときは `cargo --workspace` が
      #   "manifest is virtual, and the workspace has no members"
      # で fail するため、空 workspace では fmt/clippy/test を skip する。
      - name: detect empty workspace
        id: ws
        run: |
          if grep -qE '^members\s*=\s*\[\s*\]' Cargo.toml; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "::notice::workspace has no members yet; fmt/clippy/test skipped"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo fmt --check
        if: steps.ws.outputs.empty == 'false'
        run: cargo fmt --all -- --check

      # 以下の --exclude リストは GPU (CUDA toolkit + LLVM 21+ + cuda-oxide) を
      # 必要とする crate 一式。`#[kernel]` macro 展開で `cuda_host::CudaKernel` が
      # 要求され、transitive な cuda-bindings build script が `cuda.h` を必要と
      # するため GitHub-hosted runner では build できない。新しい GPU 依存 crate
      # を追加するときも --exclude を更新すること (CPU full check は
      # `scripts/local-ci.sh` で別途回す)。
      - name: cargo clippy
        if: steps.ws.outputs.empty == 'false'
        run: cargo clippy --workspace --all-targets --exclude gpu-runtime --exclude exp-001-cuda-oxide-kpabs --exclude exp-002-fused-kernels --exclude progress-kpabs-train --exclude nnue-trainer -- -D warnings

      - name: cargo test
        if: steps.ws.outputs.empty == 'false'
        run: cargo test --workspace --exclude gpu-runtime --exclude exp-001-cuda-oxide-kpabs --exclude exp-002-fused-kernels --exclude progress-kpabs-train --exclude nnue-trainer
