name: checks

on:
  pull_request:
  push:
    branches: [main]

# 同一 PR の続けざまの push は前の run をキャンセルする
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # rust-toolchain.toml の channel (nightly-2026-04-03) を honor。
          # rustfmt は rust-toolchain.toml に含めていないのでここで明示確保。
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # workspace.members が [] のときは `cargo --workspace` が
      #   "manifest is virtual, and the workspace has no members"
      # で fail するので、crate が追加されるまで fmt/clippy/test を skip する。
      # Stage 1 で `crates/shogi-format` 等を追加した時点で本ガードは通過する。
      - name: detect empty workspace
        id: ws
        run: |
          if grep -qE '^members\s*=\s*\[\s*\]' Cargo.toml; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "::notice::workspace has no members yet; fmt/clippy/test skipped"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo fmt --check
        if: steps.ws.outputs.empty == 'false'
        run: cargo fmt --all -- --check

      # GPU 依存 crate (gpu-runtime / progress-kpabs-train) と experiments/001 は
      # CUDA toolkit + LLVM 21+ + cuda-oxide が必要で GitHub-hosted runner では
      # build できない。self-hosted runner の別 workflow で検証する想定で本
      # workflow からは exclude する。
      #
      # Stage 1-5 (#9) で `exp-001-cuda-oxide-kpabs` も `cuda-host` を直接 dep
      # に取った (`#[kernel]` macro 展開で `cuda_host::CudaKernel` を要求)
      # ため、transitive で cuda-bindings の build script が `cuda.h` を要求して
      # GitHub runner では build fail する。Stage 1-11 (#15) で同パターンを
      # `bins/progress_kpabs_train` (= `progress-kpabs-train`) に昇格、本 workflow
      # からも exclude する (gpu-kernels は CPU のみで CI に通る)。
      # 新しい GPU 依存 crate を追加するときも同様に --exclude リストを更新すること。
      - name: cargo clippy
        if: steps.ws.outputs.empty == 'false'
        run: cargo clippy --workspace --all-targets --exclude gpu-runtime --exclude exp-001-cuda-oxide-kpabs --exclude progress-kpabs-train -- -D warnings

      - name: cargo test
        if: steps.ws.outputs.empty == 'false'
        run: cargo test --workspace --exclude gpu-runtime --exclude exp-001-cuda-oxide-kpabs --exclude progress-kpabs-train
